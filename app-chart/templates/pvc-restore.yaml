{{- range $pvcName, $pvc := .Values.persistentVolumeClaims }}
{{- if and $pvc.backup $pvc.backup.enabled }}
{{- $restore := default (dict) $pvc.restore }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: restic-restore-{{ $pvcName }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    description: "Manual restore job for PVC {{ $pvcName }}. Run manually with: kubectl create job --from=cronjob/restic-restore-{{ $pvcName }} manual-restore-{{ $pvcName }}"
spec:
  schedule: "0 0 1 1 *" # Placeholder, job is suspended
  suspend: true
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 0 # Usually want to fail fast and investigate during manual restore
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: restic
              image: {{ printf "%s:%s" $.Values.restic.image.repository $.Values.restic.image.tag }}
              env:
                - name: RESTORE_SNAPSHOT
                  value: {{ default "latest" $restore.snapshot | quote }}
                - name: CLEAN_BEFORE_RESTORE
                  value: {{ default "false" (toString $restore.cleanBeforeRestore) | quote }}
              envFrom:
                - secretRef:
                    name: restic-backup
                  prefix: "RESTIC_"
                - configMapRef:
                    name: restic-backup-{{ $pvcName }}
                  prefix: "RESTIC_"
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: restic-cache
                  mountPath: /cache/restic
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail

                  export RESTIC_PASSWORD=${RESTIC_password}
                  export RESTIC_REPOSITORY=${RESTIC_repository}
                  export RESTIC_CACHE_DIR=/cache/restic

                  # Setup SSH key and known_hosts for SFTP/rsync.net if private key is provided
                  if [ -n "${RESTIC_ssh_private_key:-}" ]; then
                    echo "[ssh] SSH private key found, preparing connection wrapper..."
                    SSH_DIR="/cache/restic/.ssh"
                    mkdir -p "$SSH_DIR"
                    chmod 700 "$SSH_DIR"

                    # Write the private key
                    echo "$RESTIC_ssh_private_key" > "$SSH_DIR/id_rsa"
                    chmod 600 "$SSH_DIR/id_rsa"

                    # Write known_hosts if fingerprint/known_hosts is provided
                    if [ -n "${RESTIC_ssh_known_hosts:-}" ]; then
                      echo "$RESTIC_ssh_known_hosts" > "$SSH_DIR/known_hosts"
                      chmod 600 "$SSH_DIR/known_hosts"
                    elif [ -n "${RESTIC_ssh_host_fingerprint:-}" ]; then
                      echo "$RESTIC_ssh_host_fingerprint" > "$SSH_DIR/known_hosts"
                      chmod 600 "$SSH_DIR/known_hosts"
                    else
                      touch "$SSH_DIR/known_hosts"
                      chmod 600 "$SSH_DIR/known_hosts"
                    fi

                    # Create a wrapper script to run ssh with correct options
                    printf '%s\n' \
                      '#!/bin/sh' \
                      'set -eu' \
                      "RESTIC_REPOSITORY='${RESTIC_repository:-}'" \
                      'TEMP="${RESTIC_REPOSITORY#sftp:}"' \
                      'TEMP="${TEMP#//}"' \
                      'SSH_HOST="${TEMP%%:*}"' \
                      'SSH_HOST="${SSH_HOST%%/*}"' \
                      'SSH_PORT_ARG=""' \
                      'PORT_AND_PATH="${TEMP#*:}"' \
                      'if [ "$PORT_AND_PATH" != "$TEMP" ]; then' \
                      '  PORT="${PORT_AND_PATH%%/*}"' \
                      '  case "$PORT" in' \
                      '    [0-9]*)' \
                      '      SSH_PORT_ARG="-p $PORT"' \
                      '      ;;' \
                      '  esac' \
                      'fi' \
                      'exec ssh -i /cache/restic/.ssh/id_rsa -o UserKnownHostsFile=/cache/restic/.ssh/known_hosts -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes ${SSH_PORT_ARG} "$SSH_HOST" -s sftp' \
                      > "$SSH_DIR/ssh-wrapper.sh"
                    chmod 700 "$SSH_DIR/ssh-wrapper.sh"

                    export RESTIC_SFTP_ARGS="-o sftp.command=/cache/restic/.ssh/ssh-wrapper.sh"
                  else
                    export RESTIC_SFTP_ARGS=""
                  fi

                  # Define restic wrapper to automatically inject SSH options if configured
                  restic() {
                    if [ -n "${RESTIC_SFTP_ARGS:-}" ]; then
                      command restic ${RESTIC_SFTP_ARGS} "$@"
                    else
                      command restic "$@"
                    fi
                  }

                  RESTORE_DIR="/data/.restore-${RESTORE_SNAPSHOT}"
                  echo "[restore] Target PVC: {{ $pvcName }}"
                  echo "[restore] Snapshot: ${RESTORE_SNAPSHOT}"
                  echo "[restore] Restore Directory: ${RESTORE_DIR}"

                  echo "[restore] Preparing and cleaning restore directory..."
                  mkdir -p "${RESTORE_DIR}"
                  # Safely clean the subdirectory
                  find "${RESTORE_DIR}" -mindepth 1 -delete

                  echo "[restore] Running restic restore..."
                  restic restore "${RESTORE_SNAPSHOT}" \
                    --target "${RESTORE_DIR}" \
                    --host "$RESTIC_HOSTNAME" \
                    --tag="pvc={{ $pvcName }}" \
                    --tag="namespace={{ $.Release.Namespace }}"

                  echo "[restore] Done. Data is available in ${RESTORE_DIR}"

          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: {{ $pvcName }}
            - name: restic-cache
              persistentVolumeClaim:
                claimName: {{ printf "%s-restic-cache" $pvcName }}

{{- end }}
{{- end }}
